name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Setup Repositories & Install Bootstrap Tools
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -y sudo curl locales zsh
            locale-gen en_US.UTF-8
          else
            # Alma/Fedora で eza/bat 等を入れるために EPEL を有効化
            if grep -q "AlmaLinux" /etc/redhat-release; then
              dnf install -y epel-release
            fi
            dnf install -y --allowerasing sudo curl langpacks-en zsh
          fi

      - name: 🛠️ Execute initrc Installer (1st Run)
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🛠️ Execute initrc Installer (2nd Run - Idempotency Check)
        env:
          CI: true
        run: |
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # ログインシェル環境をシミュレート
          [ -f "$HOME/.zshrc" ] && export DOTPATH="$GITHUB_WORKSPACE"
          export PATH="$HOME/bin:$HOME/.local/bin:/usr/local/bin:$HOME/.cargo/bin:$HOME/go/bin:/usr/bin:/bin:$PATH"
          
          echo "--- Checking Modern CLI Tools ---"
          
          # OSごとのバイナリ名の違いを吸収するチェック関数
          check_tool() {
              local name=$1
              local alt=$2
              local cmd
              cmd=$(command -v "$name" || command -v "$alt" || find /usr/bin /usr/local/bin "$HOME/bin" -name "$name" -o -name "$alt" -type f -executable 2>/dev/null | head -n 1)
              if [ -n "$cmd" ]; then
                  echo "✅ $name found at $cmd"
                  "$cmd" --version | head -n 1
              else
                  echo "❌ $name ($alt) not found"
                  return 1
              fi
          }

          check_tool "eza" "exa" || exit 1
          check_tool "bat" "batcat" || exit 1
          check_tool "fd" "fdfind" || exit 1
          
          echo "--- Checking AI Wrappers ---"
          # install.sh 内で $HOME/bin/ginv が作られているか確認
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv found at $HOME/bin/ginv"
          else
              echo "❌ ginv not found. Content of $HOME/bin:"
              ls -la "$HOME/bin" 2>/dev/null || echo "Directory empty"
              exit 1
          fi

      - name: 🧪 Idempotency & Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          echo "--- Verifying .zshrc Integrity ---"
          LOADER_COUNT=$(grep -c "common/loader.sh" "$HOME/.zshrc")
          [ "$LOADER_COUNT" -eq 1 ] && echo "✅ Loader unique" || (echo "❌ Duplicate loader"; exit 1)
          
          echo "--- Checking Template String Replacement ---"
          ! grep -r "__DOTPATH__" "$HOME/.zshrc" "$HOME/.bashrc" && echo "✅ No template strings"
