name: 🐳 Multi-Platform Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    env:
      HOME: /root
      # 【重要】権限のない /root/.docker を無視させ、Permission Denied を完全に封じ込める
      DOCKER_CONFIG: /tmp/.docker
      DOTPATH: ${{ github.workspace }}
      PATH: /root/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 📦 Pre-install Git & Tools
        run: |
          # Docker config のゴミを物理的に掃除
          mkdir -p /tmp/.docker
          rm -rf /root/.docker || true
          
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            apt-get update -qq && apt-get install -y -qq git curl tar gzip xz-utils
          else
            dnf install -y -q --allowerasing git curl tar gzip xz
          fi
          # checkout用の安全設定
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links
        shell: bash
        run: |
          # $HOME/bin を確実に PATH に入れる
          export PATH="$HOME/bin:$PATH"
          
          # Mac の場合は Brew のパスも追加
          if [ "$(uname)" = "Darwin" ]; then
            [ -d "/opt/homebrew/bin" ] && export PATH="/opt/homebrew/bin:$PATH"
            [ -d "/usr/local/bin" ] && export PATH="/usr/local/bin:$PATH"
          fi

          echo "Current PATH: $PATH"
          echo "--- Checking Tools ---"
          
          # 存在確認 (無理に source せず、コマンドがあるかだけで判定)
          for tool in eza bat fd; do
            if command -v "$tool" >/dev/null 2>&1 || [ -x "$HOME/bin/$tool" ]; then
              echo "✅ $tool found"
            else
              echo "❌ $tool not found"
              ls -la "$HOME/bin" || echo "bin directory missing"
              exit 1
            fi
          done
          
          [ -x "$HOME/bin/ginv" ] && echo "✅ ginv found" || exit 1

      - name: 👮 ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            export SC_VER="v0.10.0"
            curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${SC_VER}/shellcheck-${SC_VER}.linux.x86_64.tar.xz" | tar xJ -C /tmp
            mv /tmp/shellcheck-${SC_VER}/shellcheck /usr/local/bin/
          fi
          shellcheck install.sh scripts/*.sh common/*.sh

  macos-test:
    name: 🍎 macOS latest Build
    runs-on: macos-latest
    env:
      DOTPATH: ${{ github.workspace }}
      # PATH に brew の場所をこれでもかと詰め込む
      PATH: /Users/runner/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: darwin
          PM: brew
        run: |
          # Mac環境で brew のパスを確実に通した状態で実行
          if [ -d "/opt/homebrew/bin" ]; then
            export PATH="/opt/homebrew/bin:$PATH"
          elif [ -d "/usr/local/bin" ]; then
            export PATH="/usr/local/bin:$PATH"
          fi
          
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links
        shell: bash
        run: |
          # $HOME/bin を確実に PATH に入れる
          export PATH="$HOME/bin:$PATH"
          
          # Mac の場合は Brew のパスも追加
          if [ "$(uname)" = "Darwin" ]; then
            [ -d "/opt/homebrew/bin" ] && export PATH="/opt/homebrew/bin:$PATH"
            [ -d "/usr/local/bin" ] && export PATH="/usr/local/bin:$PATH"
          fi

          echo "Current PATH: $PATH"
          echo "--- Checking Tools ---"
          
          # 存在確認 (無理に source せず、コマンドがあるかだけで判定)
          for tool in eza bat fd; do
            if command -v "$tool" >/dev/null 2>&1 || [ -x "$HOME/bin/$tool" ]; then
              echo "✅ $tool found"
            else
              echo "❌ $tool not found"
              ls -la "$HOME/bin" || echo "bin directory missing"
              exit 1
            fi
          done
          
          [ -x "$HOME/bin/ginv" ] && echo "✅ ginv found" || exit 1
