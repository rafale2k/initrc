
name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Changelog for this version
        id: extract_changelog
        run: |
          # ヒアドキュメントで awk スクリプトを安全に実行
          cat << 'EOF' > extract.awk
          /^(## )?\[v/ {
            if (block == 1) exit;
            block = 1;
          }
          { if (block == 1) print }
          EOF

          awk -f extract.awk CHANGELOG.md > RELEASE_NOTE.md

          echo "--- DEBUG: EXTRACTED CONTENT ---"
          cat RELEASE_NOTE.md
          echo "--------------------------------"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 全体ではなく、切り出した RELEASE_NOTE.md を使う
          body_path: RELEASE_NOTE.md 
          draft: false
          prerelease: false
