name: Update Docker Hub and Assets

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: update-hub-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # 🚀 ここで README の中身をチェックする
      - name: Debug README Content
        run: |
          echo "--- Current README Badge Line ---"
          grep "img.shields.io" README.md || echo "Shields.io badge NOT FOUND in README.md"

      - name: Update Badge in README
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # パターンをさらにルーズに： 'badge/' から ')' までの間にある 'version-...' を狙い撃ち
          sed -i "s/version-[^)]*/version-v${VERSION}-blue/g" README.md
          
          echo "--- After Replace Debug ---"
          # 見つからなくてもワークフローを止めないように || true を追加
          grep "img.shields.io" README.md || echo "Badge not found but continuing..."
      
      - name: Generate OGP Image
        run: |
          sudo apt-get install -y imagemagick
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # 最新のサマリだけを確実に取るために -m 1 を追加
          SUMMARY=$(grep -m 1 -A 1 "### 🤖 AI Release Summary" README.md | tail -n 1 | sed 's/^[[:space:]>]*//' | python3 -c "import sys; print(sys.stdin.read().strip()[:50])")
          [ -z "$SUMMARY" ] && SUMMARY="Next-gen development environment configuration."

          # +set date:create +set date:modify で画像生成時のメタデータを固定し、内容が変わらない限りバイナリ差分が出ないようにする
          convert -size 1200x630 xc:#1a1b26 -gravity center \
            -fill "#7aa2f7" -pointsize 80 -annotate +0-100 "initrc $VERSION" \
            -fill "#cfc9c2" -pointsize 40 -annotate +0+50 "$SUMMARY..." \
            +set date:create +set date:modify assets/ogp.png

      - name: Rewrite asset paths for Docker Hub
        run: |
          sed -i 's|\./assets/|https://raw.githubusercontent.com/rafale2k/initrc/main/assets/|g' README.md

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: rafale2k/initrc
          readme-filepath: ./README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Docker Hub用の置換を戻す
          git checkout README.md
          
          # バッジだけ再度置換
          VERSION=${{ steps.get_version.outputs.VERSION }}
          sed -i "s/version-[^)]*/version-v${VERSION}-blue/g" README.md
          
          git add README.md assets/ogp.png
          # [skip ci] を外すことで、このプッシュによって Docker Build CI 等が連動するようにする
          git commit -m "chore: update badge to $VERSION and regenerate OGP" || echo "No changes to commit"

          # 競合回避のため、一度 fetch して ours マージしてから force push する元の戦略に復帰
          git fetch origin main
          git merge -s recursive -X ours origin/main || true
          git push origin HEAD:main --force

