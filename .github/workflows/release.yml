
name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Changelog for this version
        id: extract_changelog
        run: |
          # 1. 最初の '## [v' で始まる行から、2つ目の '## [v' の直前までを抽出
          # 2つ目の見出しが現れた瞬間に exit するので、過去ログは絶対に入らへん
          awk '/^## \[v/{if (count++) exit} {print}' CHANGELOG.md > RELEASE_NOTE.md
          
          # デバッグ：抽出された中身をログに出す（Actionsの実行ログで見れるで）
          echo "--- EXTRACTED NOTE ---"
          cat RELEASE_NOTE.md
          echo "----------------------"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 全体ではなく、切り出した RELEASE_NOTE.md を使う
          body_path: RELEASE_NOTE.md 
          draft: false
          prerelease: false
