name: 🐳 Multi-Platform Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    env:
      HOME: /root
      # 【重要】権限のない /root/.docker を回避し、Permission Denied を防ぐ
      DOCKER_CONFIG: /tmp/.docker
      PATH: /root/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin
      DOTPATH: ${{ github.workspace }}

    steps:
      - name: 📦 Pre-install Git & Tools
        run: |
          # 警告の元を物理的に隔離
          mkdir -p /tmp/.docker
          rm -rf /root/.docker || true
          
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            apt-get update -qq && apt-get install -y -qq git curl tar gzip xz-utils
          else
            dnf install -y -q --allowerasing git curl tar gzip xz
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links
        shell: bash
        run: |
          # loader.sh を読み込んでエイリアスとパスを有効化
          source ./common/loader.sh
          echo "Current PATH: $PATH"
          
          echo "--- Checking Tools with Execution ---"
          eza --version | head -n 1 || (ls -la /root/bin && exit 1)
          bat --version | head -n 1 || exit 1
          fd --version | head -n 1 || exit 1

      - name: 👮 ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            export SC_VER="v0.10.0"
            curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${SC_VER}/shellcheck-${SC_VER}.linux.x86_64.tar.xz" | tar xJ -C /tmp
            mv /tmp/shellcheck-${SC_VER}/shellcheck /usr/local/bin/
          fi
          shellcheck install.sh scripts/*.sh common/*.sh

  macos-test:
    name: 🍎 macOS latest Build
    runs-on: macos-latest
    env:
      DOTPATH: ${{ github.workspace }}
      # 【重要】Intel/M1 両方の Homebrew パスを明示的に含める
      PATH: /Users/runner/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: darwin
          PM: brew
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # インストール後にパスを再評価
          source ./common/loader.sh
          echo "Current PATH: $PATH"
          
          echo "--- Checking Tools ---"
          # command -v が alias を拾わない場合に備え type も併用
          tools=("eza" "bat" "fd")
          for tool in "${tools[@]}"; do
              if command -v "$tool" >/dev/null 2>&1 || type "$tool" >/dev/null 2>&1; then
                  echo "✅ $tool found"
              else
                  echo "❌ $tool not found"
                  ls -la "$HOME/bin"
                  exit 1
              fi
          done

          echo "--- Checking AI Wrapper ---"
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv found"
          else
              echo "❌ ginv not found"
              exit 1
          fi
