name: Update Docker Hub Description

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]      # 🚀 タグが打たれた時も動くように追加
    paths: [ "README.md", "VERSION" ] # 🚀 VERSIONが変わった時（リリース時）も対象にする

# 🚀 ここで Node.js 24 を使うように強制する
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🚀 ここでパスを GitHub Raw URL に一括変換する
      - name: Rewrite asset paths for Docker Hub
         run: |
           # 置換前の状態を1行だけ確認
           grep "./assets/" README.md | head -n 1 || echo "Not found"
           
           # 置換実行
           sed -i 's|./assets/|https://raw.githubusercontent.com/rafale2k/initrc/main/assets/|g' README.md
           
           # 置換後の状態を確認（ここが Raw URL になってれば OK）
           echo "--- After Replace ---"
           grep "raw.githubusercontent.com" README.md | head -n 1 || echo "Replace failed"

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: rafale2k/initrc  # ここを書き換える！
          readme-filepath: ./README.md
