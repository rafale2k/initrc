name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Install Remaining Bootstrap Tools
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -y sudo curl locales
            locale-gen en_US.UTF-8
          else
            dnf install -y --allowerasing sudo curl langpacks-en
          fi

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          echo "--- Checking Modern CLI Tools ---"
          eza --version
          (bat --version || batcat --version)
          (fd --version || fdfind --version)
          
          echo "--- Checking AI Wrappers ---"
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv created and executable"
          else
              echo "❌ ginv missing"
              exit 1
          fi

          if command -v llm >/dev/null 2>&1; then
              echo "✅ llm is in PATH"
          else
              echo "❌ llm not found"
              exit 1
          fi

      - name: 🛡️ Verify Shell Configs & Syntax
        run: |
          [ -f "$HOME/.zshrc" ] && echo "✅ .zshrc exists"
          zsh -n "$HOME/.zshrc" && echo "✅ .zshrc syntax is okay"
