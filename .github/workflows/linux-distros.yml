name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⚙️ Setup Environment and Run Installer
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
          # install.shに渡すための変数をセット
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # 実行パスを強制的に追加
          export PATH="$HOME/bin:$HOME/.local/bin:/usr/local/bin:$PATH"
          
          echo "--- Checking Modern CLI Tools ---"
          
          # リンクが正しく貼られているか確認
          check_cmd() {
              if command -v "$1" >/dev/null 2>&1; then
                  echo "✅ $1 found at $(command -v "$1")"
                  "$1" --version | head -n 1
              else
                  echo "❌ $1 not found"
                  return 1
              fi
          }

          check_cmd "eza"
          check_cmd "bat"
          check_cmd "fd"
          
          echo "--- Checking AI Wrappers ---"
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv found at $HOME/bin/ginv"
          else
              echo "❌ ginv not found"
              ls -la "$HOME/bin" 2>/dev/null || echo "bin dir missing"
              exit 1
          fi

      - name: 🧪 Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          echo "--- Verifying .zshrc Integrity ---"
          [ -f "$HOME/.zshrc" ] && echo "✅ .zshrc exists"
          grep -q "common/loader.sh" "$HOME/.zshrc" && echo "✅ Loader found"
