name: Update Docker Hub Description

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths: [ "README.md", "VERSION" ]
  workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite asset paths for Docker Hub
        run: |
          # 1. 置換前の状態を確認
          echo "--- Before Replace ---"
          grep "./assets/" README.md | head -n 3 || echo "Not found"
          
          # 2. 置換実行 (./assets/ を絶対URLに)
          sed -i 's|\./assets/|https://raw.githubusercontent.com/rafale2k/initrc/main/assets/|g' README.md
          
          # 3. 置換後の状態を確認
          echo "--- After Replace ---"
          grep "raw.githubusercontent.com" README.md | head -n 3 || echo "Replace failed"

      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: rafale2k/initrc
          readme-filepath: ./README.md
