name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    # CI環境のホームディレクトリとパスを固定
    env:
      HOME: /root
      PATH: /root/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          # Dockerのconfig.jsonパーミッションエラー対策
          mkdir -p /root/.docker && echo "{}" > /root/.docker/config.json
          
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # PATHを確実に通す
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Checking Modern CLI Tools ---"
          
          check_tool() {
              if command -v "$1" >/dev/null 2>&1; then
                  echo "✅ $1 found at $(command -v "$1")"
                  "$1" --version | head -n 1
              else
                  echo "❌ $1 not found in PATH ($PATH)"
                  ls -la "$HOME/bin" 2>/dev/null || echo "bin directory missing"
                  exit 1
              fi
          }

          check_tool "eza"
          check_tool "bat"
          check_tool "fd"
          
          echo "--- Checking AI Wrappers ---"
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv found at $HOME/bin/ginv"
          else
              echo "❌ ginv not found"
              exit 1
          fi

      - name: 🧪 Idempotency & Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Verifying .zshrc Integrity ---"
          if [ ! -f "$HOME/.zshrc" ]; then
              echo "❌ .zshrc not found"
              exit 1
          fi

          LOADER_COUNT=$(grep -c "common/loader.sh" "$HOME/.zshrc")
          if [ "$LOADER_COUNT" -ne 1 ]; then
              echo "❌ Duplicate or missing loader (Count: $LOADER_COUNT)"
              exit 1
          fi
          echo "✅ Loader unique"

          echo "--- Verifying Shell Syntax ---"
          # 構文チェック（zsh, bash両対応）
          zsh -n "$HOME/.zshrc" && echo "✅ .zshrc syntax okay"
          bash -n "$HOME/.bashrc" && echo "✅ .bashrc syntax okay"
