name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    # 全ステップで共通の環境変数をセット
    env:
      HOME: /root
      PATH: /root/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
          # install_functions.sh が期待する環境変数を注入
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          # install.sh 内で setup_os_repos や install_all_packages が呼ばれる想定
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # ステップ実行時にも確実に PATH を通す
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Checking Modern CLI Tools ---"
          
          # eza のチェック
          if command -v eza >/dev/null 2>&1; then
            echo "✅ eza found at $(command -v eza)"
            eza --version | head -n 1
          else
            echo "❌ eza not found in PATH ($PATH)"
            ls -la "$HOME/bin" || echo "bin directory missing"
            exit 1
          fi

          # bat のチェック
          if command -v bat >/dev/null 2>&1; then
            echo "✅ bat found at $(command -v bat)"
            bat --version | head -n 1
          else
            echo "❌ bat not found" && exit 1
          fi

          # fd のチェック
          if command -v fd >/dev/null 2>&1; then
            echo "✅ fd found at $(command -v fd)"
            fd --version | head -n 1
          else
            echo "❌ fd not found" && exit 1
          fi

          echo "--- Checking AI Wrappers ---"
          if [ -x "$HOME/bin/ginv" ]; then
            echo "✅ ginv found at $HOME/bin/ginv"
          else
            echo "❌ ginv not found at $HOME/bin/ginv"
            ls -la "$HOME/bin" 2>/dev/null || true
            exit 1
          fi

      - name: 🧪 Idempotency & Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Verifying .zshrc Integrity ---"
          if [ ! -f "$HOME/.zshrc" ]; then
            echo "❌ .zshrc not found"
            exit 1
          fi

          LOADER_COUNT=$(grep -c "common/loader.sh" "$HOME/.zshrc")
          if [ "$LOADER_COUNT" -ne 1 ]; then
            echo "❌ Loader count is $LOADER_COUNT (expected 1)"
            exit 1
          fi
          echo "✅ .zshrc integrity okay"

          echo "--- Verifying Shell Syntax ---"
          # zsh がインストールされていることを前提に構文チェック
          zsh -n "$HOME/.zshrc" && echo "✅ .zshrc syntax okay"
