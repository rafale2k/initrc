name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Install Remaining Bootstrap Tools
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -y sudo curl locales zsh
            locale-gen en_US.UTF-8
          else
            dnf install -y --allowerasing sudo curl langpacks-en zsh
          fi

      - name: 🛠️ Execute initrc Installer (1st Run)
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🛠️ Execute initrc Installer (2nd Run - Idempotency Check)
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 2回目を実行。既存設定があっても正常に上書き/スキップされるか検証
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        run: |
          # パスを確実に反映させ、ハッシュをクリア
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          hash -r 2>/dev/null || true

          echo "--- Checking Modern CLI Tools ---"
          
          # eza: command -v で見つからない場合はフォールバックパスを確認
          EZA_CMD=$(command -v eza || echo "$HOME/.local/bin/eza")
          if [ -x "$EZA_CMD" ]; then
            "$EZA_CMD" --version
            echo "✅ eza found at $EZA_CMD"
          else
            echo "❌ eza not found" && exit 1
          fi

          # bat / batcat: OSによる名称差を吸収して実行
          BAT_CMD=$(command -v batcat || command -v bat)
          if [ -n "$BAT_CMD" ]; then
            "$BAT_CMD" --version
            echo "✅ bat found as $BAT_CMD"
          else
            echo "❌ bat/batcat not found" && exit 1
          fi

          # fd / fdfind: OSによる名称差を吸収して実行
          FD_CMD=$(command -v fdfind || command -v fd)
          if [ -n "$FD_CMD" ]; then
            "$FD_CMD" --version
            echo "✅ fd found as $FD_CMD"
          else
            echo "❌ fd/fdfind not found" && exit 1
          fi
          
          echo "--- Checking AI Wrappers ---"
          [ -x "$HOME/bin/ginv" ] && echo "✅ ginv created and executable" || exit 1
          
          # llm のチェック (pipx 等で ~/.local/bin に入るケースを考慮)
          LLM_CMD=$(command -v llm || echo "$HOME/.local/bin/llm")
          if [ -x "$LLM_CMD" ]; then
            echo "✅ llm is found at $LLM_CMD"
          else
            echo "❌ llm not found" && exit 1
          fi

      - name: 🧪 Idempotency & Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Verifying .zshrc Integrity ---"
          # loader.sh の読み込みが二重になっていないか確認
          LOADER_COUNT=$(grep -c "common/loader.sh" "$HOME/.zshrc")
          if [ "$LOADER_COUNT" -gt 1 ]; then
            echo "❌ Duplicate loader detected in .zshrc (Count: $LOADER_COUNT)"
            exit 1
          fi
          [ "$LOADER_COUNT" -eq 1 ] && echo "✅ Loader unique"
          
          echo "--- Checking Template String Replacement ---"
          # __DOTPATH__ が残っていないか全主要ファイルを確認
          if grep -r "__DOTPATH__" "$HOME/.zshrc" "$HOME/.bashrc" "$HOME/.nanorc" 2>/dev/null; then
            echo "❌ Template string __DOTPATH__ still exists!"
            exit 1
          fi
          echo "✅ No template strings found"

          echo "--- Verifying Shell Syntax ---"
          zsh -n "$HOME/.zshrc" && echo "✅ .zshrc syntax okay"
          bash -n "$HOME/.bashrc" && echo "✅ .bashrc syntax okay"
