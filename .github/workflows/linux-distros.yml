name: 🐳 Multi-Platform Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    env:
      HOME: /root
      # 【重要】権限のない /root/.docker を無視させ、Permission Denied を完全に封じ込める
      DOCKER_CONFIG: /tmp/.docker
      DOTPATH: ${{ github.workspace }}
      PATH: /root/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 📦 Pre-install Git & Tools
        run: |
          # Docker config のゴミを物理的に掃除
          mkdir -p /tmp/.docker
          rm -rf /root/.docker || true
          
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            apt-get update -qq && apt-get install -y -qq git curl tar gzip xz-utils
          else
            dnf install -y -q --allowerasing git curl tar gzip xz
          fi
          # checkout用の安全設定
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: linux
          PM: ${{ matrix.pkg_manager }}
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links
        shell: bash
        run: |
          # source が失敗しても続行するようにする
          source ./common/loader.sh || true
          export PATH="$HOME/bin:$PATH"
          
          echo "--- Checking Tools with Execution ---"
          # 存在確認を優先し、実行は補助的にする
          [ -x "$HOME/bin/eza" ] || command -v eza || (ls -la "$HOME/bin" && exit 1)
          [ -x "$HOME/bin/bat" ] || command -v bat || exit 1
          [ -x "$HOME/bin/fd" ] || command -v fd || exit 1
          echo "✅ All tools verified."

      - name: 👮 ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            export SC_VER="v0.10.0"
            curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${SC_VER}/shellcheck-${SC_VER}.linux.x86_64.tar.xz" | tar xJ -C /tmp
            mv /tmp/shellcheck-${SC_VER}/shellcheck /usr/local/bin/
          fi
          shellcheck install.sh scripts/*.sh common/*.sh

  macos-test:
    name: 🍎 macOS latest Build
    runs-on: macos-latest
    env:
      DOTPATH: ${{ github.workspace }}
      # PATH に brew の場所をこれでもかと詰め込む
      PATH: /Users/runner/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin

    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          OS: darwin
          PM: brew
        run: |
          # Mac環境で brew のパスを確実に通した状態で実行
          if [ -d "/opt/homebrew/bin" ]; then
            export PATH="/opt/homebrew/bin:$PATH"
          elif [ -d "/usr/local/bin" ]; then
            export PATH="/usr/local/bin:$PATH"
          fi
          
          chmod +x install.sh
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        shell: bash
        run: |
          # 1. Homebrew の環境変数を強制ロード
          if [ -x /opt/homebrew/bin/brew ]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          elif [ -x /usr/local/bin/brew ]; then
            eval "$(/usr/local/bin/brew shellenv)"
          fi

          # 2. loader.sh を絶対パスで読み込み
          source "$GITHUB_WORKSPACE/common/loader.sh"
          
          # 3. $HOME/bin を PATH の最優先に
          export PATH="$HOME/bin:$PATH"
          echo "Current PATH: $PATH"
          
          echo "--- Checking Tools ---"
          # 実行確認と物理ファイル確認の二段構え
          tools=("eza" "bat" "fd")
          for tool in "${tools[@]}"; do
              if command -v "$tool" >/dev/null 2>&1 || [ -x "$HOME/bin/$tool" ]; then
                  echo "✅ $tool found at $(command -v $tool || echo $HOME/bin/$tool)"
              else
                  echo "❌ $tool not found"
                  echo "Directory listing of $HOME/bin:"
                  ls -la "$HOME/bin"
                  exit 1
              fi
          done
          
          echo "--- Checking AI Wrapper ---"
          if [ -x "$HOME/bin/ginv" ]; then
              echo "✅ ginv found"
          else
              echo "❌ ginv not found"
              exit 1
          fi

