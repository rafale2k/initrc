name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Changelog for this version
        id: extract_changelog
        run: |
          # 1. 最新のセクション（1つ目の ## から 2つ目の ## の手前まで）を抽出
          # 注意: 最初のマッチから次のマッチの「1行前」までを出す
          sed -n '/^## \[v/,/^## \[v/ { /^## \[v/ { /'"${GITHUB_REF_NAME}"'/ ! q }; p }' CHANGELOG.md | sed '$d' > RELEASE_NOTE.md
          
          # デバッグ用に中身を表示
          cat RELEASE_NOTE.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 全体ではなく、切り出した RELEASE_NOTE.md を使う
          body_path: RELEASE_NOTE.md 
          draft: false
          prerelease: false
