name: Update Docker Hub and Assets

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: update-hub-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Generate OGP Image
        run: |
          sudo apt-get install -y imagemagick
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # 最新のサマリだけを確実に取るために -m 1 を追加
          SUMMARY=$(grep -m 1 -A 1 "### 🤖 AI Release Summary" README.md | tail -n 1 | sed 's/^[[:space:]>]*//' | python3 -c "import sys; print(sys.stdin.read().strip()[:50])")
          [ -z "$SUMMARY" ] && SUMMARY="Next-gen development environment configuration."

          # +set date:create +set date:modify で画像生成時のメタデータを固定し、内容が変わらない限りバイナリ差分が出ないようにする
          convert -size 1200x630 xc:#1a1b26 -gravity center \
            -fill "#7aa2f7" -pointsize 80 -annotate +0-100 "initrc $VERSION" \
            -fill "#cfc9c2" -pointsize 40 -annotate +0+50 "$SUMMARY..." \
            +set date:create +set date:modify assets/ogp.png

      - name: Rewrite asset paths for Docker Hub
        run: |
          sed -i 's|\./assets/|https://raw.githubusercontent.com/rafale2k/initrc/main/assets/|g' README.md

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: rafale2k/initrc
          readme-filepath: ./README.md

      - name: Commit OGP image if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # README の Docker Hub 用パス置換を元に戻す
          git checkout README.md

          git add assets/ogp.png
          git diff --staged --quiet || git commit -m "chore: regenerate OGP image [skip ci]"
          git push origin HEAD:main || echo "⚠️ Push skipped (no changes or conflict)"
