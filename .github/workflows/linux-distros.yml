name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"
          - os: "Debian 12"
            image: "debian:12"
            pkg_manager: "apt"
          - os: "Fedora 41"
            image: "fedora:41"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            dnf install -y --allowerasing git
          fi
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Install Remaining Bootstrap Tools
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -y sudo curl locales zsh
            locale-gen en_US.UTF-8
          else
            dnf install -y --allowerasing sudo curl langpacks-en zsh
          fi

      - name: 🛠️ Execute initrc Installer (1st Run)
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x install.sh
          ./install.sh

      - name: 🛠️ Execute initrc Installer (2nd Run - Idempotency Check)
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          ./install.sh

      - name: 🔍 Verify Global Command Links (~/bin)
        run: |
          # 考えうるすべてのパスを網羅
          export PATH="$HOME/bin:$HOME/.local/bin:/usr/local/bin:$HOME/.cargo/bin:$HOME/go/bin:/usr/bin:/bin:$PATH"
          hash -r 2>/dev/null || true

          echo "--- Checking Modern CLI Tools ---"
          
          # eza: find の捜索範囲を広げ、パスが通っていない可能性を徹底排除
          EZA_CMD=$(command -v eza || find /usr /github/home /root -name eza -type f -executable 2>/dev/null | head -n 1)
          if [ -n "$EZA_CMD" ] && [ -x "$EZA_CMD" ]; then
            "$EZA_CMD" --version
            echo "✅ eza found at $EZA_CMD"
          else
            echo "❌ eza not found. Searching full system..."
            find / -name eza -type f -executable 2>/dev/null || echo "Not found anywhere"
            exit 1
          fi

          # bat / batcat
          BAT_CMD=$(command -v batcat || command -v bat || find /usr /github/home -name batcat -o -name bat -type f -executable 2>/dev/null | head -n 1)
          if [ -n "$BAT_CMD" ]; then
            "$BAT_CMD" --version
            echo "✅ bat found as $BAT_CMD"
          else
            echo "❌ bat/batcat not found" && exit 1
          fi

          # fd / fdfind
          FD_CMD=$(command -v fdfind || command -v fd || find /usr /github/home -name fdfind -o -name fd -type f -executable 2>/dev/null | head -n 1)
          if [ -n "$FD_CMD" ]; then
            "$FD_CMD" --version
            echo "✅ fd found as $FD_CMD"
          else
            echo "❌ fd/fdfind not found" && exit 1
          fi
          
          echo "--- Checking AI Wrappers ---"
          # ginv: $HOME/bin を直接指定してチェック
          GINV_CMD="$HOME/bin/ginv"
          if [ -x "$GINV_CMD" ]; then
            echo "✅ ginv found at $GINV_CMD"
          else
            echo "❌ ginv not found at $GINV_CMD. Content of $HOME/bin:"
            ls -la "$HOME/bin" 2>/dev/null || echo "Directory $HOME/bin not found"
            exit 1
          fi
          
          # llm: pipx/uv/bin などを網羅
          LLM_CMD=$(command -v llm || find /usr /github/home -name llm -type f -executable 2>/dev/null | head -n 1)
          if [ -n "$LLM_CMD" ]; then
            echo "✅ llm found at $LLM_CMD"
          else
            echo "❌ llm not found" && exit 1
          fi

      - name: 🧪 Idempotency & Integrity Verification
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          
          echo "--- Verifying .zshrc Integrity ---"
          LOADER_COUNT=$(grep -c "common/loader.sh" "$HOME/.zshrc")
          if [ "$LOADER_COUNT" -gt 1 ]; then
            echo "❌ Duplicate loader detected in .zshrc"
            exit 1
          fi
          [ "$LOADER_COUNT" -eq 1 ] && echo "✅ Loader unique"
          
          echo "--- Checking Template String Replacement ---"
          if grep -r "__DOTPATH__" "$HOME/.zshrc" "$HOME/.bashrc" "$HOME/.nanorc" 2>/dev/null; then
            echo "❌ Template string __DOTPATH__ still exists!"
            exit 1
          fi
          echo "✅ No template strings found"

          echo "--- Verifying Shell Syntax ---"
          zsh -n "$HOME/.zshrc" && echo "✅ .zshrc syntax okay"
          bash -n "$HOME/.bashrc" && echo "✅ .bashrc syntax okay"
