name: 🐳 Linux Distros Compatibility Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  matrix-test:
    name: 🚀 ${{ matrix.os }} Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "Ubuntu 24.04"
            image: "ubuntu:24.04"
            pkg_manager: "apt"
          - os: "AlmaLinux 9"
            image: "almalinux:9"
            pkg_manager: "dnf"

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      # --- 1. プリインストール & セキュリティ回避 ---
      - name: 📦 Pre-install Git & Fix Ownership
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git
          else
            # AlmaLinuxのcurl衝突回避のため --allowerasing を付与
            dnf install -y --allowerasing git
          fi
          # Git の 'dubious ownership' エラーを回避
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # --- 2. チェックアウト ---
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- 3. セットアップツールの補完 ---
      - name: 📦 Install Remaining Bootstrap Tools
        run: |
          if [ "${{ matrix.pkg_manager }}" = "apt" ]; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get install -y sudo curl locales
            locale-gen en_US.UTF-8
          else
            dnf install -y --allowerasing sudo curl langpacks-en
          fi

      # --- 4. インストーラー実行 ---
      - name: 🛠️ Execute initrc Installer
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x install.sh
          ./install.sh

      # --- 5. ツールとパスの検証 ---
      - name: 🔍 Verify Global Command Links (~/bin)
        run: |
          export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
          echo "--- Checking Modern CLI Tools ---"
          eza --version
          (bat --version || batcat --version)
          (fd --version || fdfind --version)
          
          echo "--- Checking AI Wrappers ---"
          [ -f "$HOME/bin/ginv" ] && echo "✅ ginv created"
          - name: Check AI Wrappers
          run: |
            export PATH="$HOME/bin:$HOME/.local/bin:$PATH"
            echo "--- Checking AI Wrappers ---"
    
            # ginv のチェック
            [ -x "$HOME/bin/ginv" ] && echo "✅ ginv is executable" || (echo "❌ ginv missing" && exit 1)
    
            # llm のチェック (pipx のインストール先を確認)
            if command -v llm >/dev/null 2>&1; then
                echo "✅ llm is in PATH"
            else
                echo "❌ llm not found in PATH"
                # 直接パスも確認してみる
                [ -x "$HOME/.local/bin/llm" ] && echo "❓ llm exists but PATH is broken"
                exit 1
            fi
          [ -x "$HOME/bin/ginv" ] && echo "✅ ginv is executable"

      # --- 6. 設定ファイルの整合性チェック ---
      - name: 🛡️ Verify Shell Configs & Syntax
        run: |
          grep -q 'export PATH="$HOME/bin:$PATH"' "$HOME/.zshrc"
          zsh -n "$HOME/.zshrc"
